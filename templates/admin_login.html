<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Longevity</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg" href="{{ url_for('static', filename='assets/company-logo.svg') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background - Dark Green Theme */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, #0a3d2e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, #1a5940 0%, transparent 50%),
                radial-gradient(ellipse at 60% 20%, #0f4a36 0%, transparent 45%),
                radial-gradient(ellipse at 30% 80%, #235f4d 0%, transparent 40%);
            animation: backgroundShift 15s ease-in-out infinite;
            pointer-events: none;
            z-index: -3;
        }

        /* Floating animated elements */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(16, 75, 57, 0.4) 0%, transparent 25%),
                radial-gradient(circle at 85% 85%, rgba(26, 89, 64, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 70% 30%, rgba(35, 95, 77, 0.2) 0%, transparent 35%),
                radial-gradient(circle at 25% 75%, rgba(20, 65, 50, 0.3) 0%, transparent 28%);
            animation: floatingElements 20s linear infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes backgroundShift {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                filter: hue-rotate(0deg);
            }
            25% {
                transform: scale(1.1) rotate(1deg);
                filter: hue-rotate(5deg);
            }
            50% {
                transform: scale(1.05) rotate(-0.5deg);
                filter: hue-rotate(-3deg);
            }
            75% {
                transform: scale(1.08) rotate(0.8deg);
                filter: hue-rotate(8deg);
            }
        }

        @keyframes floatingElements {
            0% {
                transform: translateX(-10px) translateY(-10px) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translateX(15px) translateY(-5px) scale(1.05);
                opacity: 0.4;
            }
            50% {
                transform: translateX(10px) translateY(20px) scale(0.98);
                opacity: 0.35;
            }
            75% {
                transform: translateX(-5px) translateY(15px) scale(1.02);
                opacity: 0.4;
            }
            100% {
                transform: translateX(-10px) translateY(-10px) scale(1);
                opacity: 0.3;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(82, 196, 176, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(82, 196, 176, 0.5);
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 50px 45px;
            max-width: 460px;
            width: 100%;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .icon {
            font-size: 4em;
            filter: drop-shadow(0 4px 12px rgba(82, 196, 176, 0.4));
            display: inline-block;
            animation: pulse 3s ease-in-out infinite;
        }

        .login-header h1 {
            font-size: 2.2em;
            font-weight: 500;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #52c4b0, #3fa896, #52c4b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.05em;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: #52c4b0;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: #52c4b0;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 0 0 3px rgba(82, 196, 176, 0.1),
                0 4px 12px rgba(82, 196, 176, 0.15);
            transform: translateY(-1px);
        }

        .btn-login {
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #52c4b0, #3fa896);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(82, 196, 176, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(82, 196, 176, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 138, 138, 0.15);
            border: 1px solid rgba(255, 138, 138, 0.3);
            color: #ff8a8a;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 0.95em;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1.1em;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-link a {
            color: #52c4b0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: #3fa896;
            transform: translateX(-3px);
        }

        .back-link a i {
            transition: transform 0.3s ease;
        }

        .back-link a:hover i {
            transform: translateX(-3px);
        }

        .security-note {
            background: rgba(82, 196, 176, 0.1);
            border: 1px solid rgba(82, 196, 176, 0.2);
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 25px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .security-note i {
            color: #52c4b0;
            margin-top: 2px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
            }

            .login-header h1 {
                font-size: 1.8em;
            }

            .icon {
                font-size: 3.5em;
            }

            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon-wrapper">
                <div class="icon">🔐</div>
            </div>
            <h1>Admin Login</h1>
            <p>Unified Dashboard Access</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/forms/admin/login">
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-key"></i>
                    Admin Password
                </label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login to Dashboard</span>
            </button>
        </form>

        <div class="security-note">
            <i class="fas fa-shield-alt"></i>
            <span>Your connection is secured. All admin activities are logged.</span>
        </div>

        <div class="back-link">
            <a href="/forms">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Forms</span>
            </a>
        </div>
    </div>
</body>
</html>
